services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scamradar
      POSTGRES_PASSWORD: scamradar
      POSTGRES_DB: scamradar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://scamradar:scamradar@db:5432/scamradar
      REDIS_URL: redis://redis:6379/0
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      GOOGLE_SAFE_BROWSING_KEY: ${GOOGLE_SAFE_BROWSING_KEY:-}
      PORT: "8000"
      DEBUG: "true"

volumes:
  pgdata:

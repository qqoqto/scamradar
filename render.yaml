# Render Blueprint — deploy with "New > Blueprint" and connect your GitHub repo
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: scamradar
    runtime: docker
    plan: free
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: GOOGLE_SAFE_BROWSING_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: scamradar-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: scamradar-redis
          property: connectionString
    healthCheckPath: /health

databases:
  - name: scamradar-db
    plan: free
    databaseName: scamradar
    user: scamradar

  - name: scamradar-redis
    plan: free
    type: redis
